<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just a textbox</title>
    <link rel="shortcut icon" href="archive-fill.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/jat.css" />
    <script type="text/javascript" src="https://code.jquery.com/jquery-1.4.1.min.js"></script>
    <script>
        // 移除空格
        function removeSpaces() {
            $("#RS").addClass("clickedRS");
            if ($("#textbox").val()) {
                var textString = $("#textbox").val().trim().replace(/\s/g, "");
                $("#textbox").val(textString);
                $(".clickedRS").html("Complete!");
                setTimeout(function () {
                    $(".clickedRS").html("");
                    $("#RS").removeClass("clickedRS");
                }, 1000);
            } else {
                $(".clickedRS").html("Textbox is still empty!");
                setTimeout(function () {
                    $(".clickedRS").html("");
                    $("#RS").removeClass("clickedRS");
                }, 1000);
            }
        }
    </script>
</head>

<body>

<nav><a class="direct" href=".">&lt; Back to Toys</a></nav>

<main>    
    <header>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="120" height="120">
            <path fill="none" d="M0 0h24v24H0z"/>
            <path fill="rgba(65,105,225,1)" d="M3 10H2V4.003C2 3.449 2.455 3 2.992 3h18.016A.99.99 0 0 1 22 4.003V10h-1v10.001a.996.996 0 0 1-.993.999H3.993A.996.996 0 0 1 3 20.001V10zm16 0H5v9h14v-9zM4 5v3h16V5H4zm5 7h6v2H9v-2z"/>
        </svg>
    </header>
    <input id="textbox" name="handler" placeholder="Please paste your text here…" title="This is *the* textbox."
        type="text">
    <label id="TH" for="handler">Textbox</label>
    <button name="removeSpaces" onclick="removeSpaces()" type="button">Remove spaces</button>
    <label id="RS" for="removeSpaces""></label>
</main>
    
<footer>
